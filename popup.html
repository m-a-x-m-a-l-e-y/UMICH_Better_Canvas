<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Better UMICH Canvas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="logo-section">
                <span class="m-logo">M</span>
                <h1>Better Canvas</h1>
            </div>
        </header>

        <main class="settings-list">
            <div class="setting-item">
                <div class="text-content">
                    <span class="label">Happening Today</span>
                    <span class="description">Show campus events on dashboard</span>
                </div>
                <label class="switch">
                    <input type="checkbox" id="toggle-happening" checked>
                    <span class="slider"></span>
                </label>
            </div>

            <hr class="divider">

            <div class="setting-item">
                <div class="text-content">
                    <span class="label">Remove Banners</span>
                    <span class="description">Hide promotional "Future" ads</span>
                </div>
                <label class="switch">
                    <input type="checkbox" id="toggle-ads">
                    <span class="slider"></span>
                </label>
            </div>
        </main>

        <footer>
            <p>Go Blue! 〽️</p>
        </footer>
    </div>
    <script src="display.js"></script>
</body>
</html>
